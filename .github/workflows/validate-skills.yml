name: validate-skills

# Runs the skill consistency gate on every push and pull request so no change
# can introduce a broken frontmatter, name mismatch, broken cross-link, or
# duplicate skill name. Mirrors skill-builder Step 6.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate all skills
        run: python skill-builder/scripts/validate_skills.py .

  smoke-test-scripts:
    # Proves the bundled document scripts actually run and give the documented
    # verdicts, against generated fixtures.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install document libraries
        # Pinned to the versions the scripts were tested against, so CI matches local.
        run: pip install openpyxl==3.1.5 python-docx==1.2.0 python-pptx==1.0.2 pypdf==6.14.2 reportlab==5.0.0
      - name: Smoke-test bundled scripts
        run: python skill-builder/scripts/smoke_test_scripts.py
